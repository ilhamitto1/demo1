<!DOCTYPE html>
<html lang="az" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#f5f1ea" />
  <meta name="google" content="notranslate" />
  <meta http-equiv="Content-Language" content="az" />

  <title>Əmlak Satış Köməkçisi — Bakı Əmlak AI</title>
  <meta
    name="description"
    content="Bakı əmlak agentliyi üçün 24/7 AI satış köməkçisi. Sizə uyğun mənzili tapaq."
  />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="app">
    <header class="header">
      <div class="header-inner">
        <div class="brand">
          <div class="brand-logo">
            <img src="logo.png" alt="Əmlak AI logo" />
          </div>
          <div class="brand-text">
            <h1 class="brand-name">Əmlak Satış Köməkçisi</h1>
            <span class="brand-status">
              <span class="status-dot"></span> Onlayn
            </span>
          </div>
        </div>

        <div class="header-actions">
          <a class="icon-btn" href="https://wa.me/994XXXXXXXXX" target="_blank" rel="noopener" aria-label="WhatsApp">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
              <path d="M19.11 4.91A10.05 10.05 0 0 0 12.04 2C6.55 2 2.09 6.46 2.09 11.95c0 1.76.46 3.47 1.34 4.98L2 22l5.22-1.37a9.94 9.94 0 0 0 4.81 1.23h.01c5.49 0 9.95-4.46 9.95-9.95 0-2.66-1.04-5.16-2.88-7Zm-7.07 15.3h-.01a8.26 8.26 0 0 1-4.21-1.15l-.3-.18-3.1.81.83-3.02-.2-.31a8.27 8.27 0 0 1-1.27-4.41c0-4.57 3.72-8.29 8.3-8.29 2.21 0 4.29.86 5.86 2.43a8.23 8.23 0 0 1 2.43 5.87c0 4.57-3.72 8.25-8.33 8.25Zm4.55-6.18c-.25-.13-1.47-.72-1.7-.81-.23-.08-.39-.13-.56.13-.17.25-.64.81-.78.97-.14.17-.29.19-.54.06-.25-.12-1.05-.39-2-1.23-.74-.66-1.24-1.47-1.39-1.72-.14-.25-.02-.39.11-.51.11-.11.25-.29.37-.43.12-.14.16-.25.25-.41.08-.17.04-.31-.02-.43-.06-.13-.56-1.34-.76-1.84-.2-.48-.41-.42-.56-.43h-.48c-.17 0-.43.06-.66.31-.23.25-.86.84-.86 2.05 0 1.21.88 2.38 1 2.55.13.17 1.74 2.66 4.21 3.73.59.25 1.05.41 1.41.52.59.19 1.13.16 1.55.1.47-.07 1.47-.6 1.68-1.18.21-.58.21-1.08.14-1.18-.06-.1-.22-.16-.47-.28Z"/>
            </svg>
          </a>

          <a class="icon-btn" href="https://instagram.com/emlak_meslehetcisi" target="_blank" rel="noopener" aria-label="Instagram">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="5"></rect>
              <circle cx="12" cy="12" r="4"></circle>
              <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle>
            </svg>
          </a>
        </div>
      </div>
    </header>

    <main class="chat" id="chat" aria-live="polite"></main>

    <footer class="composer" id="composer">
      <form class="composer-inner" id="chat-form" autocomplete="off">
        <div class="input-wrap">
          <input
            id="message-input"
            type="text"
            placeholder="Bir mesaj yazın..."
            autocomplete="off"
            autocapitalize="sentences"
            autocorrect="on"
            spellcheck="true"
            enterkeyhint="send"
            aria-label="Mesaj"
            translate="no"
          />
        </div>

        <button class="send-btn" type="submit" aria-label="Göndər">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12l14-7-7 14-2-5-5-2z"></path>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
